<div id="secrets">
  {% if secret_error %}<p class="error">{{ secret_error }}</p>{% endif %}
  <p class="meta">Stored secret names (values are never shown):</p>
  {% if view.secret_names %}
  <ul class="browse-list">
    {% for env in view.secret_names %}
    <li class="browse-entry">
      <code>{{ env }}</code>
      <button type="button" class="link-btn"
              hx-post="/ui/config/secrets/{{ env }}/delete"
              hx-target="#secrets" hx-swap="outerHTML"
              hx-vals='{"project": "{{ project or "" }}"}'>Delete</button>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty hint">No secrets stored.</p>
  {% endif %}

  <form class="inline-form" hx-post="/ui/config/secrets" hx-target="#secrets" hx-swap="outerHTML">
    <input type="hidden" name="project" value="{{ project or '' }}">
    <input name="env_name" placeholder="ENV_VAR_NAME" required>
    <input name="value" type="password" placeholder="key value (stored, never shown)" required>
    <button type="submit">Set secret</button>
  </form>
</div>
