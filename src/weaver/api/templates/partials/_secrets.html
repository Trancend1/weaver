<div id="secrets">
  {% if secret_saved %}<p class="saved-note" role="status">Saved ✓</p>{% endif %}
  {% if secret_error %}<p class="error" role="alert">{{ secret_error }}</p>{% endif %}
  <p class="meta">Stored secret names (values are never shown):</p>
  {% if view.secret_names %}
  <ul class="browse-list">
    {% for env in view.secret_names %}
    <li class="browse-entry">
      <code>{{ env }}</code>
      <button type="button" class="link-btn"
              hx-post="/ui/providers/secrets/{{ env }}/delete"
              hx-target="#secrets" hx-swap="outerHTML"
              hx-vals='{"project": "{{ project or "" }}"}'
              hx-confirm="Delete the stored secret '{{ env }}'?">Delete</button>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty hint">No secrets stored.</p>
  {% endif %}

  <form class="inline-form" hx-post="/ui/providers/secrets" hx-target="#secrets" hx-swap="outerHTML">
    <input type="hidden" name="project" value="{{ project or '' }}">
    <input name="env_name" placeholder="ENV_VAR_NAME" required aria-label="Secret env-var name">
    <input name="value" type="password" placeholder="key value (stored, never shown)" required aria-label="Secret value (stored, never shown)">
    <button type="submit">Set secret</button>
  </form>
</div>
