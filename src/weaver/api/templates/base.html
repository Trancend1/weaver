<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Weaver Cockpit{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/ui">Weaver</a>
    <nav class="topnav">
      <a href="/ui">Dashboard</a>
      <a href="/ui/new">New novel</a>
      <a href="/ui/config">Config</a>
    </nav>
    <span class="api-hint">FastAPI cockpit (functional-parity UI)</span>
  </header>

  <main class="content" id="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>serve-api · local only (127.0.0.1)</span>
  </footer>
</body>
</html>
