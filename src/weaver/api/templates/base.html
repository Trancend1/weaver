<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Weaver Cockpit{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/ui">Weaver</a>
    {% set _path = request.url.path if request else "" %}
    <nav class="topnav">
      <a href="/ui"{% if _path == "/ui" %} class="active" aria-current="page"{% endif %}>Dashboard</a>
      <a href="/ui/new"{% if _path.startswith("/ui/new") %} class="active" aria-current="page"{% endif %}>New novel</a>
      <a href="/ui/config"{% if _path.startswith("/ui/config") %} class="active" aria-current="page"{% endif %}>Config</a>
    </nav>
    <span class="api-hint">JP→EN translation workbench</span>
  </header>

  <main class="content" id="content">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <span>Weaver · runs locally on your machine</span>
  </footer>
</body>
</html>
