<head><meta charset="utf-8"><title>第三巻 試練</title></head>
<body>
<h1>第一章 城への道</h1>
<p>遠くに城の塔が見えた。主人公は迷わず前へ進んだ。</p>
<p>門番は剣を構えたが、主人公の目を見てすぐに道を譲った。</p>
<h2>第二章 王との謁見</h2>
<p>広い玉座の間で、老いた王が静かに語りかけた。</p>
<p>「この国を救えるのは、お前だけだ。」</p>
<p>主人公は深く頭を下げ、その使命を受け入れた。</p>
</body>
</html>
