<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Weaver</title>
<style>
  /* Self-contained loading splash for the Tauri desktop shell.
     No external assets, no webfonts, no CDN. Vanilla/milk-white ground,
     ink hand, gold + green fate-threads weaving in. */
  :root{
    --ink:#1a1712; --muted:#6f6a61; --page:#faf9f6; --gold:#c79a4a;
    --green:#3a9d6e;
    --ui:"IBM Plex Sans","Segoe UI",ui-sans-serif,system-ui,sans-serif;
  }
  html,body{height:100%;margin:0}
  body{
    display:grid;place-items:center;color:var(--ink);font-family:var(--ui);
    background:
      radial-gradient(circle at 50% 36%, #ffffff, transparent 26rem),
      linear-gradient(rgb(122 79 24 / .028) 1px, transparent 1px),
      linear-gradient(90deg, rgb(122 79 24 / .028) 1px, transparent 1px),
      var(--page);
    background-size:auto,28px 28px,28px 28px,auto;
  }
  .splash{display:flex;flex-direction:column;align-items:center;gap:22px;transform:translateY(-4%)}
  .mark{width:112px;height:112px;filter:drop-shadow(0 8px 20px rgb(28 24 18 / .12))}
  .thread,.web{stroke-dasharray:46;stroke-dashoffset:46;animation:weave 2.6s ease-in-out infinite}
  .web{animation-delay:.05s;opacity:.7}
  .t2{animation-delay:.16s}.t3{animation-delay:.28s}.t4{animation-delay:.4s}.t5{animation-delay:.52s}
  .node{opacity:0;animation:bloom 2.6s ease-in-out infinite}
  .n2{animation-delay:.16s}.n3{animation-delay:.28s}.n4{animation-delay:.4s}.n5{animation-delay:.52s}
  @keyframes weave{0%{stroke-dashoffset:46}38%,72%{stroke-dashoffset:0}100%{stroke-dashoffset:-46}}
  @keyframes bloom{0%,30%{opacity:0}46%,74%{opacity:1}100%{opacity:0}}
  .wordmark{display:flex;align-items:center;gap:11px;font-weight:750;letter-spacing:-.02em;font-size:22px}
  .wordmark small{font-weight:550;letter-spacing:.18em;text-transform:uppercase;font-size:11px;color:var(--muted)}
  .status{display:flex;align-items:center;gap:9px;color:var(--muted);font-size:13px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 0 rgb(199 154 74 / .5);animation:pulse 1.4s ease-out infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgb(199 154 74 / .5)}100%{box-shadow:0 0 0 9px rgb(199 154 74 / 0)}}
  @media (prefers-reduced-motion: reduce){
    .thread,.web,.node{animation:none;stroke-dashoffset:0;opacity:1}.web{opacity:.7}.dot{animation:none}
  }
</style>
</head>
<body>
  <div class="splash">
    <svg class="mark" viewBox="0 0 48 48" aria-label="Weaver" role="img" fill="none">
      <!-- fate web -->
      <path class="web"    d="M4 14 Q 13.5 4 24 2.6 Q 34.5 4 44 16" stroke="#3a9d6e" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"></path>
      <path class="web t3" d="M10 5.5 L 24 2 L 39 7" stroke="#3a9d6e" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"></path>
      <!-- threads -->
      <path class="thread"    d="M9 21 L 4 14"      stroke="#c79a4a" stroke-width="1.45" stroke-linecap="round"></path>
      <path class="thread t2" d="M9 21 L 10 5.5"    stroke="#c79a4a" stroke-width="1.45" stroke-linecap="round"></path>
      <path class="thread t2" d="M17.5 15.2 L 17 2.5" stroke="#c79a4a" stroke-width="1.45" stroke-linecap="round"></path>
      <path class="thread t3" d="M22 11.6 L 24 2"   stroke="#c79a4a" stroke-width="1.45" stroke-linecap="round"></path>
      <path class="thread t4" d="M26.4 13.6 L 31 3.5" stroke="#c79a4a" stroke-width="1.45" stroke-linecap="round"></path>
      <path class="thread t4" d="M30.3 18 L 39 7"   stroke="#c79a4a" stroke-width="1.45" stroke-linecap="round"></path>
      <path class="thread t5" d="M30.3 18 L 44 16"  stroke="#c79a4a" stroke-width="1.45" stroke-linecap="round"></path>
      <!-- hand -->
      <path d="M17 43 L16.5 35 Q14.8 33 13.8 31 L9.8 24.5 Q8.2 22.2 9.4 21 Q10.8 20 12 22 L14.5 26.5 Q15 27.5 15.8 27.2 L15.8 16.6 Q17.5 14.6 19.2 16.6 L19.2 24.5 Q19.7 26 20.2 24.5 L20.2 13 Q22 10.8 23.8 13 L23.8 24.5 Q24.2 26 24.65 24.7 L24.65 14.8 Q26.4 12.8 28.15 14.8 L28.15 25 Q28.45 26.4 28.75 25.4 L28.75 19 Q30.3 17.2 31.85 19 L31.9 27 Q32.6 31 32 34 L30 43 Q23.5 44.2 17 43 Z" fill="#1c1812"></path>
      <!-- nodes -->
      <circle class="node"    cx="4"  cy="14"  r="1.4" fill="#c79a4a"></circle>
      <circle class="node n2" cx="10" cy="5.5" r="1.4" fill="#c79a4a"></circle>
      <circle class="node n3" cx="24" cy="2"   r="1.5" fill="#c79a4a"></circle>
      <circle class="node n4" cx="31" cy="3.5" r="1.4" fill="#c79a4a"></circle>
      <circle class="node n5" cx="44" cy="16"  r="1.4" fill="#c79a4a"></circle>
    </svg>
    <div class="wordmark">Weaver <small>Cockpit</small></div>
    <div class="status"><span class="dot"></span> Spinning up your workbench…</div>
  </div>
</body>
</html>
