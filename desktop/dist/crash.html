<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Weaver — startup failed</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: system-ui, "Segoe UI", sans-serif;
        background: #0e1116;
        color: #e6e9ef;
        padding: 28px 32px;
        line-height: 1.5;
      }
      h1 { font-size: 18px; margin: 0 0 4px; color: #ff8585; }
      .detail { font-size: 13px; color: #c4cbd8; margin: 0 0 18px; }
      .meta { font-size: 12px; color: #8a93a3; margin-bottom: 18px; }
      .meta code { color: #b9c2d0; }
      h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: #8a93a3; margin: 0 0 8px; }
      pre {
        margin: 0;
        max-height: 46vh;
        overflow: auto;
        background: #070a0e;
        border: 1px solid #20262f;
        border-radius: 8px;
        padding: 12px 14px;
        font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
        font-size: 12px;
        color: #cdd6e3;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .empty { color: #6c7585; font-style: italic; }
    </style>
  </head>
  <body>
    <h1 id="headline">Weaver could not start</h1>
    <p class="detail" id="detail"></p>
    <p class="meta" id="meta"></p>
    <h2>Sidecar console (last lines)</h2>
    <pre id="log"><span class="empty">No console output was captured.</span></pre>

    <script>
      // The Rust host bakes the crash payload into `window.__WEAVER_CRASH__`
      // via an initialization script (runs before this document loads), so
      // there is no fetch and no race with navigation.
      (function () {
        var c = window.__WEAVER_CRASH__ || {};
        var headline = document.getElementById("headline");
        var detail = document.getElementById("detail");
        var meta = document.getElementById("meta");
        var log = document.getElementById("log");

        if (c.headline) headline.textContent = c.headline;
        if (c.detail) detail.textContent = c.detail;

        var bits = [];
        if (c.exitCode !== null && c.exitCode !== undefined) {
          var m = c.exitMeaning ? " — " + c.exitMeaning : "";
          bits.push("Exit code: " + c.exitCode + m);
        }
        if (c.logPath) bits.push("Full log: " + c.logPath);
        meta.innerHTML = bits
          .map(function (b) { return "<code>" + b.replace(/[<>&]/g, function (ch) {
            return { "<": "&lt;", ">": "&gt;", "&": "&amp;" }[ch];
          }) + "</code>"; })
          .join("<br>");

        var tail = Array.isArray(c.logTail) ? c.logTail : [];
        if (tail.length) {
          log.textContent = tail.join("\n");
        }
      })();
    </script>
  </body>
</html>
